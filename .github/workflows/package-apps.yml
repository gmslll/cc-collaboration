name: Package apps

# Builds the Flutter GUI apps (Windows / macOS / Android), each on its native
# runner because Flutter desktop builds are host-bound — this is how we get a
# Windows .exe package without a Windows machine. Each app embeds the cc-handoff
# CLI next to its executable (desktop) so it needs no separate install; the
# Android APK is a remote client and embeds nothing.
#
# Run it manually from the Actions tab ("Run workflow") for throwaway run
# artifacts, or push a v* tag to ALSO attach the three packages to that tag's
# GitHub Release for download (Windows/macOS zips, Android APK) — run artifacts
# expire; release assets are permanent.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.1' # match the local toolchain (Dart sdk ^3.12.1)

jobs:
  windows:
    name: windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter config --enable-windows-desktop
      - name: package windows
        shell: pwsh
        run: ./scripts/package.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: cc-handoff-windows
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macos (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter config --enable-macos-desktop
      - name: package macos
        run: bash scripts/package.sh macos
      - uses: actions/upload-artifact@v4
        with:
          name: cc-handoff-macos
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  android:
    name: android (apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: package android
        run: bash scripts/package.sh android
      - uses: actions/upload-artifact@v4
        with:
          name: cc-handoff-android
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  # On a v* tag, gather the three packages and attach them to that tag's GitHub
  # Release so people can download them (run artifacts above expire; release
  # assets are permanent). One upload step (not per-matrix-job) avoids racing to
  # create the release. Coexists with release.yml (the Go CLI binaries) on the
  # same release — both append their own files; this job sets no `body`, so it
  # won't clobber release.yml's CHANGELOG notes.
  release:
    name: attach to release
    needs: [windows, macos, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
