name: Package apps

# Builds the Flutter GUI apps (Windows / macOS / Android), each on its native
# runner because Flutter desktop builds are host-bound — this is how we get a
# Windows .exe package without a Windows machine. Each app embeds the cc-handoff
# CLI next to its executable (desktop) so it needs no separate install; the
# Android APK is a remote client and embeds nothing.
#
# Run it manually from the Actions tab ("Run workflow"), or it fires on a v* tag.
# Output: downloadable artifacts on the run (Windows/macOS zips, Android APK).

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.1' # match the local toolchain (Dart sdk ^3.12.1)

jobs:
  windows:
    name: windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter config --enable-windows-desktop
      - name: package windows
        shell: pwsh
        run: ./scripts/package.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: cc-handoff-windows
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macos (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter config --enable-macos-desktop
      - name: package macos
        run: bash scripts/package.sh macos
      - uses: actions/upload-artifact@v4
        with:
          name: cc-handoff-macos
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  android:
    name: android (apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: package android
        run: bash scripts/package.sh android
      - uses: actions/upload-artifact@v4
        with:
          name: cc-handoff-android
          path: dist/*
          if-no-files-found: error
          retention-days: 14
