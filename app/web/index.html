<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Infinite Agent Platform Web</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      min-height: 100%;
      margin: 0;
      background: #07111f;
      color: #e7edf7;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #web-fallback {
      position: fixed;
      inset: 0;
      display: grid;
      align-content: center;
      gap: 22px;
      padding: 40px;
      background:
        linear-gradient(180deg, rgba(7, 17, 31, 0.96), rgba(8, 15, 27, 0.98)),
        #07111f;
      box-sizing: border-box;
    }

    #web-fallback main {
      max-width: 720px;
    }

    #web-fallback h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    #web-fallback p {
      margin: 0;
      color: #aeb9cc;
      font-size: 16px;
      line-height: 1.6;
    }

    #web-fallback .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    #web-fallback a {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid #2b3950;
      border-radius: 8px;
      color: #e7edf7;
      text-decoration: none;
      background: #121d2e;
      font-weight: 650;
    }

    #web-fallback a.primary {
      border-color: #818cf8;
      background: #818cf8;
      color: #07111f;
    }
  </style>
</head>
<body>
  <div id="web-fallback">
    <main>
      <h1>Infinite Agent Platform Web</h1>
      <p>
        The enterprise relay is online. If the remote workspace does not finish
        loading in this browser, use the relay console below or open the native
        desktop client.
      </p>
      <div class="actions">
        <a class="primary" href="/ui/">Open Relay Console</a>
        <a href="/healthz">Health Check</a>
      </div>
    </main>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
