# cc-handoff dogfood marker — generated by scripts/dogfood.sh setup
# Safe to overwrite when the marker is present; do NOT delete this line if you
# adopt this file for prod, otherwise `dogfood.sh cleanup` will remove it.

[identity]
# Legacy point-to-point dogfood target. Team/project routing does not need this.
partner = "user@backend"

[paths]
base = "origin/main"
repo = "test-frontend"

# Frontend rarely submits handoffs to backend — partner_mapping intentionally
# left empty here. The receiving side (this repo) doesn't need rules to pick
# up packages from backend; rules live on the sender side.

[triggers]
auto_launch = false
# terminal_app = "iterm2"   # uncomment + set auto_launch=true for urgent path tests
