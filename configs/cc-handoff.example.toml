# Repo-level config — copy to <repo-root>/.cc-handoff.toml
# Team/project routing is the default. The sender identity comes from the
# logged-in user or machine token; recipients come from the bound team project
# or from explicit --project/--org/--member flags.

[paths]
swagger = "docs/swagger.yaml"   # optional; if set, swagger delta is included in the package
base    = "origin/main"          # optional; git base ref for commits / changed paths
# repo  = "test-backend"      # optional; defaults to basename of repo root

[partner_mapping]
# Rules are applied to each changed path collected from git.
# Named regex groups become template variables in suggest_edit / suggest_create.
# These are heuristic hints — the receiver's Claude will verify them against the real frontend tree.
[[partner_mapping.rule]]
when_path_matches         = "^internal/module/(?P<domain>[^/]+)/"
suggest_edit              = ["lib/api/{domain}.ts"]
suggest_create_if_missing = true

[[partner_mapping.rule]]
when_path_matches = "^internal/module/(?P<domain>[^/]+)/dto/"
suggest_edit      = ["types/{domain}.ts"]

[triggers]
auto_launch        = false       # gate: if false, no terminal is ever auto-launched (notifications still fire)
auto_launch_normal = false       # if true, normal-priority handoffs ALSO auto-launch (default: only urgent does);
                                 # ignored when auto_launch=false
terminal_app       = "terminal"  # "terminal" | "iterm2"
launch_mode        = "window"    # "window" (default: new window) | "split" (iTerm2 split-pane;
                                 # Terminal.app falls back to a new tab; Windows always uses a new window)
launch_interactive = false       # default false: run agent one-shot (e.g. `claude -p "$prompt"`).
                                 # Set true to start agent interactively and inject the prompt body
                                 # via the terminal app's API after the REPL is ready (uses
                                 # bracketed-paste markers; macOS only — Windows still one-shots).
pre_launch         = ""          # shell snippet inserted between `cd <repo>` and the agent invocation.
                                 # Useful for multi-account OAuth / env activation.
                                 # Example: pre_launch = "clset 6"
ack_on_launch      = "never"     # if/when the auto-launched handoff is ack'd on the relay
                                 # (state moves pending → picked):
                                 #   "never"        — manual /pickup later (default; preserves old flow)
                                 #   "after_exit"   — interactive: prompt body gets a postlude asking
                                 #                    the agent to call pickup_handoff MCP at end of
                                 #                    turn; one-shot (-p): shell chains `<claude> &&
                                 #                    cc-handoff pickup <id>` so pickup runs only on
                                 #                    a clean exit
                                 #   "on_launch"    — shell chains `cc-handoff pickup <id>` BEFORE
                                 #                    the agent (in a brace group so pickup failure
                                 #                    doesn't block the agent). Requires
                                 #                    launch_interactive=false.
                                 #   "slash_pickup" — start the agent interactively, then inject
                                 #                    `/pickup` as the first user input. The slash
                                 #                    command's pickup.md template tells claude to
                                 #                    list_inbox + pickup_handoff itself. No prompt
                                 #                    body is injected — the slash command resolves
                                 #                    to the integration flow. Requires
                                 #                    launch_interactive=true and Claude (slash
                                 #                    commands aren't a Codex feature). macOS only.
wake_on_comment    = false       # Claude only: if true, partner replies pull this Claude session
                                 # back into a turn via a Stop hook. Run `cc-handoff init
                                 # --with-wake-on-comment` to install the hook into .claude/settings.json.
mute_user_presence = false       # default false: pop a notification when other identities come
                                 # online / go offline (relay broadcasts presence on watch
                                 # connect/disconnect). Set true to silence them.

# Legacy point-to-point compatibility only. New team/project setups do not need
# this section.
#
# [identity]
# me = "you@backend"             # optional old per-repo override
# partner = "alex@frontend"      # explicit old point-to-point target
# partners = ["backend", "frontend"] # old submit_bug role aliases
