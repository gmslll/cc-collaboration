# cc-handoff dogfood marker — generated by scripts/dogfood.sh setup
# Safe to overwrite when the marker is present; do NOT delete this line if you
# adopt this file for prod, otherwise `dogfood.sh cleanup` will remove it.

[identity]
# Legacy point-to-point dogfood target. Team/project routing does not need this.
partner = "alex@frontend"

[paths]
swagger = "docs/swagger.yaml"   # both swagger.yaml and swagger.json exist; yaml is more standard
base    = "origin/main"
repo    = "test-backend"

# Module layout in this repo has two depths:
#   internal/module/<domain>/handler/                  (tracking, summary, analytics, ...)
#   internal/module/<group>/<domain>/handler/          (mdm/*, app/*, iam/*, bms/*)
#
# The frontend file naming is plural + kebab-case (customer → customers.ts,
# feecode → fee-codes.ts), so we emit BOTH `{domain}.ts` and `{domain}s.ts`
# as candidates and let the receiving Claude pick whichever exists.
# suggest_create_if_missing is OFF because both candidates can't be created.

[partner_mapping]

# --- two-level: internal/module/<group>/<domain>/... ---
[[partner_mapping.rule]]
when_path_matches = "^internal/module/(?P<group>[^/]+)/(?P<domain>[^/]+)/handler/"
suggest_edit      = ["lib/api/{domain}.ts", "lib/api/{domain}s.ts"]

[[partner_mapping.rule]]
when_path_matches = "^internal/module/(?P<group>[^/]+)/(?P<domain>[^/]+)/dto/"
suggest_edit      = ["lib/api/{domain}.ts", "lib/api/{domain}s.ts"]

# --- single-level: internal/module/<domain>/... ---
[[partner_mapping.rule]]
when_path_matches = "^internal/module/(?P<domain>[^/]+)/handler/"
suggest_edit      = ["lib/api/{domain}.ts", "lib/api/{domain}s.ts"]

[[partner_mapping.rule]]
when_path_matches = "^internal/module/(?P<domain>[^/]+)/dto/"
suggest_edit      = ["lib/api/{domain}.ts", "lib/api/{domain}s.ts"]

[triggers]
auto_launch = false
